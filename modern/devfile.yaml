schemaVersion: 2.2.2
metadata:
  name: demo-camel-mta-modern
components:
  - name: tools
    container:
      image: registry.redhat.io/devspaces/udi-rhel9:latest
      memoryLimit: 2Gi
      mountSources: true
      command: ["sleep", "infinity"]
      volumeMounts:
        - name: m2
          path: /home/user/.m2
  - name: m2
    volume:
      size: 5Gi
commands:
  - id: build
    exec:
      component: tools
      workingDir: ${PROJECT_SOURCE}
      commandLine: mvn -f modern/pom.xml -DskipTests package
      group:
        kind: build
        isDefault: true
  - id: git-status
    exec:
      component: tools
      workingDir: ${PROJECT_SOURCE}
      commandLine: git status
      group:
        kind: run
  - id: git-push
    exec:
      component: tools
      workingDir: ${PROJECT_SOURCE}
      commandLine: git push
      group:
        kind: run
  - id: dev-kaoto-consumer
    exec:
      component: tools
      workingDir: ${PROJECT_SOURCE}
      commandLine: mvn -f modern/pom.xml -pl apps/kaoto-consumer quarkus:dev
      group:
        kind: run
  - id: dev-consumer
    exec:
      component: tools
      workingDir: ${PROJECT_SOURCE}
      commandLine: mvn -f modern/pom.xml -pl apps/event-consumer quarkus:dev
      group:
        kind: run
  - id: dev-producer
    exec:
      component: tools
      workingDir: ${PROJECT_SOURCE}
      commandLine: mvn -f modern/pom.xml -pl apps/queue-producer quarkus:dev
      group:
        kind: run

