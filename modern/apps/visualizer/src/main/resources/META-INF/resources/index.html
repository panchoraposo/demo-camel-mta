<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AMQ Visualizer (modern)</title>
    <style>
      :root { color-scheme: light dark; }
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; margin: 24px; }
      .row { display: flex; gap: 16px; flex-wrap: wrap; }
      .card { border: 1px solid #ddd; border-radius: 12px; padding: 16px; min-width: 320px; flex: 1; }
      .muted { opacity: 0.75; }
      code { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
      table { width: 100%; border-collapse: collapse; }
      td, th { border-top: 1px solid #ddd; padding: 8px; vertical-align: top; }
      .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; border: 1px solid #ddd; }
      .error { color: #b91c1c; }
    </style>
  </head>
  <body>
    <h2>AMQ Visualizer <span class="muted">(modern)</span></h2>
    <div class="muted">
      This UI polls <code>/api/snapshots</code> (server-side proxy) to show live counters.
    </div>

    <div id="status" class="muted" style="margin-top: 12px;"></div>

    <div id="cards" class="row" style="margin-top: 16px;"></div>

    <script>
      const statusEl = document.getElementById("status");
      const cardsEl = document.getElementById("cards");

      function el(tag, attrs = {}, children = []) {
        const n = document.createElement(tag);
        for (const [k, v] of Object.entries(attrs)) {
          if (k === "class") n.className = v;
          else if (k === "text") n.textContent = v;
          else n.setAttribute(k, v);
        }
        for (const c of children) n.appendChild(c);
        return n;
      }

      async function fetchJson(url) {
        const r = await fetch(url, { cache: "no-store" });
        if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
        return await r.json();
      }

      function renderCard(url, snap, err) {
        const header = el("div", {}, [
          el("div", { class: "muted", text: "Snapshot URL" }),
          el("div", {}, [el("code", { text: url })]),
        ]);

        const stats = el("div", { style: "margin-top: 10px;" }, [
          el("div", { class: "pill", text: `received: ${snap ? snap.received : "-"}` }),
          document.createTextNode(" "),
          el("div", { class: "pill", text: `duplicates: ${snap ? snap.duplicates : "-"}` }),
        ]);

        const table = el("table", { style: "margin-top: 12px;" });
        const thead = el("thead");
        thead.appendChild(el("tr", {}, [
          el("th", { text: "receivedAt" }),
          el("th", { text: "eventId" }),
          el("th", { text: "body" }),
        ]));
        table.appendChild(thead);
        const tbody = el("tbody");
        const last = (snap && snap.last) ? snap.last : [];
        for (const item of last) {
          tbody.appendChild(el("tr", {}, [
            el("td", {}, [el("code", { text: item.receivedAt || "" })]),
            el("td", {}, [el("code", { text: item.eventId || "" })]),
            el("td", {}, [el("code", { text: (item.body || "").slice(0, 220) })]),
          ]));
        }
        table.appendChild(tbody);

        const errLine = err ? el("div", { class: "error", style: "margin-top: 10px;", text: String(err) }) : null;

        return el("div", { class: "card" }, [header, stats, table].concat(errLine ? [errLine] : []));
      }

      async function tick() {
        cardsEl.textContent = "";
        const entries = await fetchJson("/api/snapshots");
        const urls = (entries || []).map(e => e.url);
        if (urls.length === 0) {
          statusEl.textContent = "No snapshot URLs configured. Set DEMO_SNAPSHOT_URLS (comma-separated).";
          return;
        }
        statusEl.textContent = `Polling ${urls.length} snapshot endpoint(s) every 2s.`;
        for (const e of entries) {
          cardsEl.appendChild(renderCard(e.url, e.snapshot || null, e.ok ? null : (e.error || "error")));
        }
      }

      (async () => {
        await tick();
        setInterval(tick, 2000);
      })();
    </script>
  </body>
</html>
