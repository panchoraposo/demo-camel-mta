quarkus.http.port=8082

quarkus.http.cors.enabled=true
quarkus.http.cors.origins=*

demo.visualizer.snapshot-urls=${DEMO_SNAPSHOT_URLS:__none__}

# Flow UI (producer -> broker -> consumer). Broker metrics come from Jolokia.
demo.flow.producer-snapshot-url=${DEMO_FLOW_PRODUCER_SNAPSHOT_URL:http://modern-queue-producer:8080/api/snapshot}
demo.flow.consumer-snapshot-url=${DEMO_FLOW_CONSUMER_SNAPSHOT_URL:http://modern-event-consumer:8081/api/snapshot}
demo.flow.broker-jolokia-url=${DEMO_FLOW_BROKER_JOLOKIA_URL:http://amq-broker-wconsj-0-svc:8161/console/jolokia}
demo.flow.broker-username=${DEMO_FLOW_BROKER_USERNAME:admin}
demo.flow.broker-password=${DEMO_FLOW_BROKER_PASSWORD:admin}
demo.flow.queue=${DEMO_FLOW_QUEUE:demo.events}

