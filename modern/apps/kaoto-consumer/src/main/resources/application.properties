quarkus.http.port=8083

quarkus.http.cors.enabled=true
quarkus.http.cors.origins=*

demo.broker.url=${DEMO_BROKER_URL:tcp://localhost:61616}
demo.broker.username=${DEMO_BROKER_USERNAME:admin}
demo.broker.password=${DEMO_BROKER_PASSWORD:admin}
demo.broker.queue=${DEMO_BROKER_QUEUE:demo.events}

camel.component.jms.connection-factory=#connectionFactory

# Load YAML routes from resources (Kaoto-friendly).
camel.main.routes-include-pattern=classpath:routes/*.camel.yaml

# Toggleable logging (you can wire this in Kaoto with a choice step).
demo.enhanced.logging.enabled=${DEMO_ENHANCED_LOGGING_ENABLED:false}

