quarkus.http.port=8080
%dev.quarkus.http.port=28080

quarkus.http.cors.enabled=true
quarkus.http.cors.origins=*

# Let Dev Services (or the cluster env var) provide brokers.
# In dev mode, Quarkus Dev Services will set kafka.bootstrap.servers.
demo.kafka.bootstrap=${KAFKA_BOOTSTRAP_SERVERS:${kafka.bootstrap.servers}}
demo.kafka.topic=${DEMO_KAFKA_TOPIC:wind.events}

camel.component.kafka.brokers={{demo.kafka.bootstrap}}

# Load YAML routes from resources (Kaoto-friendly).
camel.main.routes-include-pattern=classpath:routes/*.camel.yaml

# Share the same Kafka Dev Service across multiple Quarkus dev runs.
%dev.quarkus.kafka.devservices.enabled=true
%dev.quarkus.kafka.devservices.shared=true
%dev.quarkus.kafka.devservices.service-name=wind-kafka

demo.producer.id=${DEMO_PRODUCER_ID:wind-producer}
demo.producer.timer-enabled=${DEMO_TIMER_ENABLED:true}
demo.producer.period-ms=${DEMO_PERIOD_MS:250}

