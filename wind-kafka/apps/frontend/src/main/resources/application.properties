quarkus.http.port=8082
%dev.quarkus.http.port=28082

quarkus.http.cors.enabled=true
quarkus.http.cors.origins=*

# Where the frontend should read live events from
demo.consumer.base-url=${DEMO_CONSUMER_BASE_URL:http://localhost:28084}

# How many SSE connections to open against the consumer Service.
# With multiple consumer replicas behind a Service in OpenShift, multiple connections tend to land on different pods,
# letting the UI discover more unique consumer IDs over time.
%dev.demo.consumer.streams=${DEMO_CONSUMER_STREAMS:1}
demo.consumer.streams=${DEMO_CONSUMER_STREAMS:8}

