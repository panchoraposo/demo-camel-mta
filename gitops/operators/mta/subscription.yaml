apiVersion: operators.coreos.com/v1alpha1
kind: OperatorGroup
metadata:
  name: openshift-mta-operators
  namespace: openshift-mta
spec:
  targetNamespaces:
    - openshift-mta
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: mta-operator
  namespace: openshift-mta
spec:
  channel: stable-v8.1
  installPlanApproval: Automatic
  name: mta-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace

