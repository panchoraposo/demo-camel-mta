apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: wind-kafka-producer-build
spec:
  tasks:
    - name: start-build
      taskRef:
        name: oc
      params:
        - name: script
          value: |
            set -euo pipefail
            build="$(oc -n wind-kafka start-build wind-kafka-producer -o name)"
            echo "Started ${build}"
            for i in $(seq 1 180); do
              phase="$(oc -n wind-kafka get "${build}" -o jsonpath='{.status.phase}')"
              echo "phase=${phase}"
              if [[ "${phase}" == "Complete" ]]; then
                exit 0
              fi
              if [[ "${phase}" == "Failed" || "${phase}" == "Error" || "${phase}" == "Cancelled" ]]; then
                oc -n wind-kafka logs "${build}" || true
                exit 1
              fi
              sleep 5
            done
            echo "Timed out waiting for ${build}"
            oc -n wind-kafka logs "${build}" || true
            exit 1
    - name: rollout
      runAfter: ["start-build"]
      taskRef:
        name: oc
      params:
        - name: script
          value: |
            oc -n wind-kafka rollout restart deploy/wind-kafka-producer
            oc -n wind-kafka rollout status deploy/wind-kafka-producer --timeout=10m
    - name: smoke
      runAfter: ["rollout"]
      taskRef:
        name: oc
      params:
        - name: script
          value: |
            host=$(oc -n wind-kafka get route wind-kafka-producer -o jsonpath='{.spec.host}')
            curl -ksSf "https://${host}/q/health" >/dev/null
---
