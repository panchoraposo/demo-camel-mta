apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: wind-kafka-pool
  labels:
    strimzi.io/cluster: wind-kafka
spec:
  replicas: 3
  roles:
    - controller
    - broker
  storage:
    type: ephemeral
---
apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: wind-kafka
spec:
  kafka:
    # AMQ Streams 3.2 supports Kafka 4.1+ (KRaft / ZooKeeper-less)
    version: 4.2.0
    metadataVersion: 4.2-IV0
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
    config:
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      default.replication.factor: 3
      min.insync.replicas: 2
  entityOperator:
    topicOperator: {}
    userOperator: {}
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: wind.events
  labels:
    strimzi.io/cluster: wind-kafka
spec:
  partitions: 6
  replicas: 3
  config:
    retention.ms: 3600000

