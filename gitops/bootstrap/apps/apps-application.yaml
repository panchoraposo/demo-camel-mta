apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-camel-mta-apps
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/panchoraposo/demo-camel-mta.git
    targetRevision: main
    path: gitops/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: demo-camel-mta
  ignoreDifferences:
    # OpenShift ImageStream triggers mutate Deployment container images to digests.
    # Keep the app Synced by ignoring image field drift.
    - group: apps
      kind: Deployment
      jqPathExpressions:
        - .spec.template.spec.containers[].image
    # Allow demo scripts to scale replicas without Argo CD self-heal reverting it.
    - group: apps
      kind: Deployment
      name: modern-queue-producer
      namespace: demo-camel-mta
      jsonPointers:
        - /spec/replicas
    - group: apps
      kind: Deployment
      name: modern-event-consumer
      namespace: demo-camel-mta
      jsonPointers:
        - /spec/replicas
    - group: apps
      kind: Deployment
      name: modern-kaoto-consumer
      namespace: demo-camel-mta
      jsonPointers:
        - /spec/replicas
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

