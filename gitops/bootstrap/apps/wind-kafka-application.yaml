apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wind-kafka
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/panchoraposo/demo-camel-mta.git
    targetRevision: main
    path: gitops/wind-kafka
  destination:
    server: https://kubernetes.default.svc
    namespace: wind-kafka
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

