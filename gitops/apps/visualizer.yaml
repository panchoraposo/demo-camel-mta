apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: modern-visualizer
spec:
  runPolicy: Serial
  source:
    type: Git
    git:
      uri: https://github.com/panchoraposo/demo-camel-mta.git
      ref: main
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: modern/apps/visualizer/Containerfile
  output:
    to:
      kind: ImageStreamTag
      name: modern-visualizer:latest
  triggers:
    - type: ConfigChange
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: modern-visualizer
  annotations:
    image.openshift.io/triggers: '[{"from":{"kind":"ImageStreamTag","name":"modern-visualizer:latest"},"fieldPath":"spec.template.spec.containers[?(@.name==\"app\")].image"}]'
spec:
  replicas: 1
  selector:
    matchLabels:
      app: modern-visualizer
  template:
    metadata:
      labels:
        app: modern-visualizer
    spec:
      containers:
        - name: app
          image: ' '
          imagePullPolicy: Always
          env:
            - name: DEMO_AMQ1_LABEL
              value: AMQ1 (in-cluster)
            - name: DEMO_AMQ1_COLOR
              value: "#2563eb"
            - name: DEMO_AMQ1_SNAPSHOT_URL
              value: http://modern-event-consumer:8081/api/snapshot

            - name: DEMO_AMQ2_LABEL
              value: AMQ2 (demo)
            - name: DEMO_AMQ2_COLOR
              value: "#16a34a"

            - name: DEMO_AMQ3_LABEL
              value: AMQ3 (demo)
            - name: DEMO_AMQ3_COLOR
              value: "#f97316"
          ports:
            - containerPort: 8082
              name: http
---
apiVersion: v1
kind: Service
metadata:
  name: modern-visualizer
spec:
  selector:
    app: modern-visualizer
  ports:
    - name: http
      port: 8082
      targetPort: http
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: modern-visualizer
spec:
  to:
    kind: Service
    name: modern-visualizer
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

