apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: modern-visualizer
spec:
  runPolicy: Serial
  source:
    type: Git
    git:
      uri: https://github.com/panchoraposo/demo-camel-mta.git
      ref: main
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: modern/apps/visualizer/Containerfile
  output:
    to:
      kind: ImageStreamTag
      name: modern-visualizer:latest
  triggers:
    - type: ConfigChange
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: modern-visualizer
  annotations:
    image.openshift.io/triggers: '[{"from":{"kind":"ImageStreamTag","name":"modern-visualizer:latest"},"fieldPath":"spec.template.spec.containers[?(@.name==\"app\")].image"}]'
spec:
  replicas: 1
  selector:
    matchLabels:
      app: modern-visualizer
  template:
    metadata:
      labels:
        app: modern-visualizer
    spec:
      containers:
        - name: app
          image: ' '
          imagePullPolicy: Always
          env:
            - name: DEMO_FLOW_PRODUCER_SNAPSHOT_URL
              value: http://modern-queue-producer:8080/api/snapshot
            - name: DEMO_FLOW_CONSUMER_SNAPSHOT_URL
              value: http://modern-event-consumer:8081/api/snapshot
            - name: DEMO_FLOW_CONSUMER2_SNAPSHOT_URL
              value: http://modern-kaoto-consumer:8083/api/snapshot
            - name: DEMO_FLOW_CONSUMER1_NAME
              value: event-consumer
            - name: DEMO_FLOW_CONSUMER2_NAME
              value: kaoto-consumer
            - name: DEMO_FLOW_BROKER_JOLOKIA_URL
              value: http://amq-broker-wconsj-0-svc:8161/console/jolokia
            - name: DEMO_FLOW_BROKER_USERNAME
              value: admin
            - name: DEMO_FLOW_BROKER_PASSWORD
              value: admin
            - name: DEMO_FLOW_QUEUE
              value: demo.events
          ports:
            - containerPort: 8082
              name: http
---
apiVersion: v1
kind: Service
metadata:
  name: modern-visualizer
spec:
  selector:
    app: modern-visualizer
  ports:
    - name: http
      port: 8082
      targetPort: http
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: modern-visualizer
spec:
  to:
    kind: Service
    name: modern-visualizer
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

