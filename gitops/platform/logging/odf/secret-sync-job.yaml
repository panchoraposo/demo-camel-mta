apiVersion: batch/v1
kind: Job
metadata:
  name: loki-odf-secret-sync
  namespace: openshift-logging
  annotations:
    argocd.argoproj.io/sync-wave: "25"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 10
  template:
    metadata:
      name: loki-odf-secret-sync
    spec:
      serviceAccountName: loki-secret-sync
      restartPolicy: OnFailure
      containers:
        - name: oc
          image: registry.redhat.io/openshift4/ose-cli:latest
          command:
            - /bin/bash
            - -lc
            - |
              set -euo pipefail

              OBC_NS="openshift-logging"
              OBC_NAME="loki-bucket-odf"
              OUT_SECRET_NS="openshift-logging"
              OUT_SECRET_NAME="logging-loki-s3"

              echo "Waiting for OBC Secret/ConfigMap ${OBC_NS}/${OBC_NAME}..."
              for i in $(seq 1 120); do
                if oc -n "${OBC_NS}" get secret "${OBC_NAME}" >/dev/null 2>&1 && oc -n "${OBC_NS}" get configmap "${OBC_NAME}" >/dev/null 2>&1; then
                  break
                fi
                sleep 2
              done

              BUCKET_HOST="$(oc -n "${OBC_NS}" get configmap "${OBC_NAME}" -o jsonpath='{.data.BUCKET_HOST}')"
              BUCKET_NAME="$(oc -n "${OBC_NS}" get configmap "${OBC_NAME}" -o jsonpath='{.data.BUCKET_NAME}')"
              BUCKET_PORT="$(oc -n "${OBC_NS}" get configmap "${OBC_NAME}" -o jsonpath='{.data.BUCKET_PORT}')"

              ACCESS_KEY_ID="$(oc -n "${OBC_NS}" get secret "${OBC_NAME}" -o jsonpath='{.data.AWS_ACCESS_KEY_ID}' | base64 -d)"
              SECRET_ACCESS_KEY="$(oc -n "${OBC_NS}" get secret "${OBC_NAME}" -o jsonpath='{.data.AWS_SECRET_ACCESS_KEY}' | base64 -d)"

              ENDPOINT="https://${BUCKET_HOST}:${BUCKET_PORT}"

              echo "Creating/updating Loki object storage secret ${OUT_SECRET_NS}/${OUT_SECRET_NAME}"
              oc -n "${OUT_SECRET_NS}" create secret generic "${OUT_SECRET_NAME}" \
                --from-literal=access_key_id="${ACCESS_KEY_ID}" \
                --from-literal=access_key_secret="${SECRET_ACCESS_KEY}" \
                --from-literal=bucketnames="${BUCKET_NAME}" \
                --from-literal=endpoint="${ENDPOINT}" \
                --from-literal=forcepathstyle="true" \
                --dry-run=client -o yaml | oc -n "${OUT_SECRET_NS}" apply -f -

              echo "Done."

