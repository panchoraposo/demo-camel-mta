apiVersion: loki.grafana.com/v1
kind: LokiStack
metadata:
  name: loki
  namespace: openshift-logging
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  size: 1x.demo
  limits:
    global:
      retention:
        days: 1
  storage:
    schemas:
      - version: v13
        effectiveDate: "2026-01-01"
    secret:
      name: logging-loki-s3
      type: s3
  storageClassName: gp3-csi
  tenants:
    mode: openshift-logging

