apiVersion: observability.openshift.io/v1
kind: ClusterLogForwarder
metadata:
  name: instance
  namespace: openshift-logging
  annotations:
    argocd.argoproj.io/sync-wave: "40"
spec:
  managementState: Managed
  serviceAccount:
    name: logging-collector
  inputs:
    # Restrict collection to the demo namespace to keep the cluster lightweight.
    - name: demo-applications
      type: application
      application:
        includes:
          - namespace: demo-camel-mta
  outputs:
    - name: lokistack-out
      type: lokiStack
      lokiStack:
        target:
          name: loki
          namespace: openshift-logging
        authentication:
          token:
            from: serviceAccount
      tls:
        ca:
          configMapName: loki-gateway-ca-bundle
          key: service-ca.crt
  pipelines:
    - name: default-logstore
      inputRefs:
        - demo-applications
      outputRefs:
        - lokistack-out

