apiVersion: tackle.konveyor.io/v1alpha1
kind: Tackle
metadata:
  name: mta
  namespace: openshift-mta
  annotations:
    argocd.argoproj.io/sync-wave: "50"
spec:
  rwx_supported: "false"
  rwo_storage_class: gp3-csi
  hub_bucket_volume_size: "2.5Gi"
  maven_data_volume_size: "2.5Gi"
  feature_auth_required: "false"

  # Analyzer tasks can be memory intensive (OOMKilled). Increase task pod resources.
  # Keep requests==limits for predictable scheduling.
  analyzer_container_requests_cpu: "2"
  analyzer_container_limits_cpu: "2"
  analyzer_container_requests_memory: "4Gi"
  analyzer_container_limits_memory: "4Gi"

  provider_java_container_requests_cpu: "2"
  provider_java_container_limits_cpu: "2"
  provider_java_container_requests_memory: "4Gi"
  provider_java_container_limits_memory: "4Gi"

