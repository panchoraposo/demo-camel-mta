quarkus.http.port=8080

# Allow easy local testing from browser/curl
quarkus.http.cors=true
quarkus.http.cors.origins=*

# AMQ broker connection (CORE JMS)
# Broker URL resolution order:
# 1) explicit DEMO_BROKER_URL (podman compose, OpenShift, etc.)
# 2) Quarkus Dev Services URL (when running quarkus:dev with Dev Services enabled)
# 3) localhost (manual local broker)
demo.broker.url=${DEMO_BROKER_URL:${quarkus.artemis.url:tcp://localhost:61616}}
demo.broker.username=${DEMO_BROKER_USERNAME:admin}
demo.broker.password=${DEMO_BROKER_PASSWORD:admin}
demo.broker.queue=${DEMO_BROKER_QUEUE:demo.events}

# Camel JMS wiring
camel.component.jms.connection-factory=#connectionFactory

# Dev Services (legacy apps): start an Artemis broker in dev mode when DEMO_BROKER_URL is not set.
%dev.quarkus.artemis.devservices.enabled=true
%dev.quarkus.artemis.devservices.image-name=${DEMO_ARTEMIS_IMAGE:quay.io/artemiscloud/activemq-artemis-broker:artemis.2.32.0}
%dev.quarkus.artemis.username=${DEMO_BROKER_USERNAME:admin}
%dev.quarkus.artemis.password=${DEMO_BROKER_PASSWORD:admin}

# Producer behavior
demo.producer.id=${DEMO_PRODUCER_ID:legacy-producer}
demo.producer.timer-enabled=${DEMO_TIMER_ENABLED:true}
demo.producer.period-ms=${DEMO_PERIOD_MS:2000}

