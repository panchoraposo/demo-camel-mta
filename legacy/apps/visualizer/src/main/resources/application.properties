quarkus.http.port=8082

quarkus.http.cors=true
quarkus.http.cors.origins=*

# Comma-separated list of snapshot endpoints for the UI.
# Example (local):
# demo.visualizer.snapshot-urls=http://localhost:8081/api/snapshot
demo.visualizer.snapshot-urls=${DEMO_SNAPSHOT_URLS:}

# 3-cluster UI (similar to amq-multicluster visualizer).
demo.ui.amq1-label=${DEMO_AMQ1_LABEL:AMQ1}
demo.ui.amq1-color=${DEMO_AMQ1_COLOR:#2563eb}
demo.consumers.amq1-snapshot-url=${DEMO_AMQ1_SNAPSHOT_URL:}

demo.ui.amq2-label=${DEMO_AMQ2_LABEL:AMQ2}
demo.ui.amq2-color=${DEMO_AMQ2_COLOR:#16a34a}
demo.consumers.amq2-snapshot-url=${DEMO_AMQ2_SNAPSHOT_URL:}

demo.ui.amq3-label=${DEMO_AMQ3_LABEL:AMQ3}
demo.ui.amq3-color=${DEMO_AMQ3_COLOR:#f97316}
demo.consumers.amq3-snapshot-url=${DEMO_AMQ3_SNAPSHOT_URL:}

