<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AMQ Visualizer (legacy)</title>
    <style>
      :root { color-scheme: light dark; }
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; margin: 24px; }
      .row { display: flex; gap: 16px; flex-wrap: wrap; }
      .card { border: 1px solid #ddd; border-radius: 12px; padding: 0; min-width: 320px; flex: 1; overflow: hidden; }
      .cardInner { padding: 14px 16px 16px; }
      .banner { padding: 10px 16px; color: white; font-weight: 700; display: flex; justify-content: space-between; align-items: center; }
      .badge { font-size: 12px; padding: 2px 8px; border-radius: 999px; background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.28); }
      .muted { opacity: 0.75; }
      .big { font-size: 32px; font-weight: 700; }
      code { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
      table { width: 100%; border-collapse: collapse; }
      td, th { border-top: 1px solid #ddd; padding: 8px; vertical-align: top; }
      .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; border: 1px solid #ddd; }
      .error { color: #b91c1c; }
    </style>
  </head>
  <body>
    <h2>AMQ Visualizer <span class="muted">(legacy)</span></h2>
    <div class="muted">
      This UI polls <code>/api/snapshots</code> (server-side proxy) to show live counters.
    </div>

    <div id="status" class="muted" style="margin-top: 12px;"></div>

    <div id="cards" class="row" style="margin-top: 16px;"></div>

    <script>
      const statusEl = document.getElementById("status");
      const cardsEl = document.getElementById("cards");

      function el(tag, attrs = {}, children = []) {
        const n = document.createElement(tag);
        for (const [k, v] of Object.entries(attrs)) {
          if (k === "class") n.className = v;
          else if (k === "text") n.textContent = v;
          else n.setAttribute(k, v);
        }
        for (const c of children) n.appendChild(c);
        return n;
      }

      async function fetchJson(url) {
        const r = await fetch(url, { cache: "no-store" });
        if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
        return await r.json();
      }

      function renderCard(entry) {
        const url = entry.url || "";
        const snap = entry.snapshot || null;
        const err = entry.ok ? null : (entry.error || "error");
        const isDemo = url === "DEMO_DATA" || url === "" || url == null;

        const banner = el("div", { class: "banner" }, [
          el("div", { text: entry.label || entry.id || "cluster" }),
          el("div", { class: "badge", text: err ? "ERROR" : (isDemo ? "DEMO_DATA" : "LIVE") }),
        ]);
        banner.style.background = entry.color || "#334155";

        const header = el("div", { class: "cardInner" }, [
          el("div", { class: "muted", text: "Snapshot URL" }),
          el("div", {}, [el("code", { text: url || "-" })]),
        ]);

        const stats = el("div", { style: "margin-top: 10px;" }, [
          el("div", { class: "pill", text: `received: ${snap ? snap.received : "-"}` }),
          document.createTextNode(" "),
          el("div", { class: "pill", text: `duplicates: ${snap ? snap.duplicates : "-"}` }),
        ]);

        const table = el("table", { style: "margin-top: 12px;" });
        const thead = el("thead");
        thead.appendChild(el("tr", {}, [
          el("th", { text: "receivedAt" }),
          el("th", { text: "eventId" }),
          el("th", { text: "body" }),
        ]));
        table.appendChild(thead);
        const tbody = el("tbody");
        const last = (snap && snap.last) ? snap.last : [];
        for (const item of last) {
          tbody.appendChild(el("tr", {}, [
            el("td", {}, [el("code", { text: item.receivedAt || "" })]),
            el("td", {}, [el("code", { text: item.eventId || "" })]),
            el("td", {}, [el("code", { text: (item.body || "").slice(0, 220) })]),
          ]));
        }
        table.appendChild(tbody);

        const errLine = err ? el("div", { class: "error", style: "margin-top: 10px;", text: String(err) }) : null;

        header.appendChild(stats);
        header.appendChild(table);
        if (errLine) header.appendChild(errLine);
        return el("div", { class: "card" }, [banner, header]);
      }

      async function tick() {
        cardsEl.textContent = "";
        const entries = await fetchJson("/api/snapshots");
        if (!entries || entries.length === 0) {
          statusEl.textContent = "No clusters configured. Set DEMO_AMQ1_SNAPSHOT_URL / DEMO_AMQ2_SNAPSHOT_URL / DEMO_AMQ3_SNAPSHOT_URL (or DEMO_SNAPSHOT_URLS).";
          return;
        }
        statusEl.textContent = `Polling ${entries.length} cluster(s) every 2s.`;
        for (const e of entries) {
          cardsEl.appendChild(renderCard(e));
        }
      }

      (async () => {
        await tick();
        setInterval(tick, 2000);
      })();
    </script>
  </body>
</html>
