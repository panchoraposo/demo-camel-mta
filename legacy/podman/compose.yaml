services:
  amq:
    image: registry.redhat.io/amq7/amq-broker-rhel9:7.14
    container_name: amq-broker
    ports:
      - "61616:61616" # CORE
      - "8161:8161"   # Web console
    environment:
      AMQ_USER: admin
      AMQ_PASSWORD: admin
    healthcheck:
      test: ["CMD", "bash", "-lc", "echo > /dev/tcp/localhost/8161" ]
      interval: 5s
      timeout: 3s
      retries: 30

  legacy-producer:
    build:
      context: ../..
      dockerfile: legacy/apps/queue-producer/Containerfile
    environment:
      DEMO_BROKER_URL: tcp://amq:61616
      DEMO_BROKER_USERNAME: admin
      DEMO_BROKER_PASSWORD: admin
      DEMO_BROKER_QUEUE: demo.events
      DEMO_TIMER_ENABLED: "true"
      DEMO_PERIOD_MS: "1500"
    depends_on:
      amq:
        condition: service_healthy
    ports:
      - "8080:8080"

  legacy-consumer:
    build:
      context: ../..
      dockerfile: legacy/apps/event-consumer/Containerfile
    environment:
      DEMO_BROKER_URL: tcp://amq:61616
      DEMO_BROKER_USERNAME: admin
      DEMO_BROKER_PASSWORD: admin
      DEMO_BROKER_QUEUE: demo.events
    depends_on:
      amq:
        condition: service_healthy
    ports:
      - "8081:8081"

  legacy-visualizer:
    build:
      context: ../..
      dockerfile: legacy/apps/visualizer/Containerfile
    environment:
      DEMO_SNAPSHOT_URLS: http://legacy-consumer:8081/api/snapshot
    depends_on:
      - legacy-consumer
    ports:
      - "8082:8082"
